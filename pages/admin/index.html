<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login — Rock Steady ATL</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="../../assets/images/logo/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body>
<div class="admin-login-page">
  <div class="admin-login-card">
    <img src="../../assets/images/logo/logo.png" width="1254" height="1254" alt="Rock Steady ATL" class="admin-login-logo">
    <h2>Staff Portal</h2>
    <p>Rock Steady ATL · UmojaServ Admin</p>

    <form id="login-form" class="admin-login-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" name="username" class="form-input" placeholder="Enter staff username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Enter staff password" required autocomplete="current-password">
      </div>
      <div id="login-error" style="color:#f87171; font-size:.8rem; text-align:center; min-height:18px;"></div>
      <button type="submit" class="btn btn-gold" style="width:100%; margin-top:4px;">Sign In</button>
    </form>

    <p style="margin-top:24px; font-size:.75rem; color:var(--soft); text-align:center;">
      Authorised personnel only · <a href="../../index.html" style="color:var(--gold);">Back to site</a>
    </p>
  </div>
</div>
<script src="../../assets/js/admin.js?v=5"></script>
<script>
  /* Inline login — runs immediately, no external dependency or timing issues */
  (function () {
    var USER = "root";
    var PASS = "UmojaServ2026!";
    var KEY  = "rs_admin_auth";

    var form  = document.getElementById("login-form");
    var errEl = document.getElementById("login-error");

    if (!form) return;

    form.onsubmit = function (e) {
      e.preventDefault();
      e.stopPropagation();

      var u = (form.querySelector("[name=username]").value || "").trim().toLowerCase();
      var p = (form.querySelector("[name=password]").value || "");

      if (u === USER && p === PASS) {
        try { sessionStorage.setItem(KEY, "1"); } catch(ex) {}
        window.location.href = "dashboard.html";
      } else {
        if (errEl) errEl.textContent = "Incorrect username or password. Please try again.";
        form.querySelector("[name=password]").value = "";
        form.querySelector("[name=username]").focus();
      }
    };
  })();
</script>
</body>
</html>
